**Change 2: Open `docker/docker-compose.yml`** and find the `dagster-webserver` and `dagster-daemon` sections. Add this line to the `environment` block of both:
```
DAGSTER_DATABASE_URL: postgresql://regs:regs@postgres:5432/regs_checker
