# Docker Compose — Local development infrastructure
#
# Provides Postgres + MinIO for local development.
# The app itself runs outside Docker via: python start.py
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   python start.py
#
# Default connection (already in .env.example):
#   REGS_DATABASE_URL=postgresql://regs:regs@127.0.0.1:5434/regs_checker
services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — local development database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: regs_checker
      POSTGRES_USER: regs
      POSTGRES_PASSWORD: regs
    ports:
      - "${REGS_PG_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regs -d regs_checker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for raw artifacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default buckets on startup
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/raw-artifacts --ignore-existing;
      mc mb local/processed-artifacts --ignore-existing;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
