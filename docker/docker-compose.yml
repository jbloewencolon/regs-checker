# Docker Compose — Recommendation #4, #5, #10
# Postgres + MinIO + Dagster only. No Neo4j. Redis added when caching is needed.
#
# Database routing:
#   REGS_DATABASE_URL  — application data (sources, documents, extractions).
#                        Set in ../.env to point at Supabase for production,
#                        or leave default for local-only development.
#   DAGSTER_DATABASE_URL — Dagster internal storage (runs, events, schedules).
#                          Always points at the local Docker postgres.
version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Dagster internal storage + local dev fallback
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: regs_checker
      POSTGRES_USER: regs
      POSTGRES_PASSWORD: regs
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regs -d regs_checker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for raw artifacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default buckets on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/raw-artifacts --ignore-existing;
      mc mb local/processed-artifacts --ignore-existing;
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # Dagster — orchestration (asset-based lineage model)
  # ---------------------------------------------------------------------------
  dagster-webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: dagster-webserver -h 0.0.0.0 -p 3000
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_DATABASE_URL: postgresql://regs:regs@postgres:5432/regs_checker
      REGS_DATABASE_URL: ${REGS_DATABASE_URL:-postgresql://regs:regs@postgres:5432/regs_checker}
      REGS_S3_ENDPOINT_URL: ${REGS_S3_ENDPOINT_URL:-http://minio:9000}
    ports:
      - "3000:3000"
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  dagster-daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: dagster-daemon run
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_DATABASE_URL: postgresql://regs:regs@postgres:5432/regs_checker
      REGS_DATABASE_URL: ${REGS_DATABASE_URL:-postgresql://regs:regs@postgres:5432/regs_checker}
      REGS_S3_ENDPOINT_URL: ${REGS_S3_ENDPOINT_URL:-http://minio:9000}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # FastAPI application — unified /internal/ + /v1/ routes
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      REGS_DATABASE_URL: ${REGS_DATABASE_URL:-postgresql://regs:regs@postgres:5432/regs_checker}
      REGS_S3_ENDPOINT_URL: ${REGS_S3_ENDPOINT_URL:-http://minio:9000}
      REGS_DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src
      - ../alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  dagster_home:
