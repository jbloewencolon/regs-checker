name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install "ruff>=0.2.0"

      - name: Lint - hard gate (undefined names, syntax errors)
        run: ruff check src/ --exclude src/_archived --exclude src/ingestion/_archived --select E9,F

      - name: Lint - advisory (full ruleset, informational only)
        run: ruff check src/ --exclude src/_archived --exclude src/ingestion/_archived || true
