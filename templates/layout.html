<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regs Checker — {{ title | default("Dashboard") }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="header-left">
        <h1>Regs Checker</h1>
        <span class="subtitle">AI Legislation Extraction Pipeline</span>
      </div>
      <nav class="header-nav">
        <a href="/dashboard" class="nav-link {% if active_nav == 'pipeline' or not active_nav %}active{% endif %}">Pipeline</a>
        <a href="/dashboard/analytics" class="nav-link {% if active_nav == 'analytics' %}active{% endif %}">Analytics</a>
        <a href="/dashboard/review" class="nav-link {% if active_nav == 'review' %}active{% endif %}">
          Review
          <span class="nav-badge" id="review-count"
                hx-get="/dashboard/api/stats"
                hx-trigger="load"
                hx-swap="none"></span>
        </a>
        <a href="/dashboard/triage" class="nav-link {% if active_nav == 'triage' %}active{% endif %}">Triage</a>
      </nav>
      <div class="status-bar" id="status-bar"
           hx-get="/dashboard/api/stats"
           hx-trigger="load, every 15s, pipelineReset from:body"
           hx-swap="innerHTML">
        <span class="stat">Loading...</span>
      </div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    function copyToClipboard(elementId) {
      const el = document.getElementById(elementId);
      navigator.clipboard.writeText(el.textContent.trim());
      const btn = el.parentElement.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }

    // Toggle detail panels (generic — used in pipeline/triage pages)
    function toggleDetailPanel(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.toggle('expanded');
      }
    }
  </script>
</body>
</html>
